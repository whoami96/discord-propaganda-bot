services:
  propaganda-bot:
    image: wh0ami96/discord-propaganda-bot:latest
    build: .
    container_name: propaganda-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DAILY_DISPATCH_COUNT=${DAILY_DISPATCH_COUNT:-3}
      - QUIET_HOURS_START=${QUIET_HOURS_START:-23}
      - QUIET_HOURS_END=${QUIET_HOURS_END:-8}
      - TZ=Europe/Warsaw
